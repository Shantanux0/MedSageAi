spring.application.name=demo

# ── App Configuration ──
server.port=${PORT:8080}

# ── PostgreSQL Database ──
# Use environment variables for production (e.g. Render)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mediai_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
# Changed from 'create' to 'update' for production safety
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Security ──
# Important: Set JWT_SECRET in your deployment dashboard
jwt.secret=${JWT_SECRET:REPLACE_WITH_YOUR_SECRET}
jwt.expiration=86400000

# ── File Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Groq AI Engine ──
# Important: Set GROQ_API_KEY in your deployment dashboard
groq.api.key=${GROQ_API_KEY:REPLACE_WITH_YOUR_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# ── Local file upload dir ──
file.upload-dir=./uploads